train:
  seed: 42
  epochs: 50
  batch_size: 8
  save_dir: runs/train/
  name: geal_stage1
  storage: true
  log_name: train.log
  resume: false
  checkpoint_path: runs/train/geal/stage1_best.pt
  gpu: 0
  # Interaction-image knowledge injection (PIAD only; needs dataset.use_image: true).
  # See docs/design_interaction_image_branch2d.md.
  img_align_weight: 0.2
  img_align_temp: 0.07

optimizer:
  lr: 1e-4
  tlr: 5e-6
  weight_decay: 1e-3
  step_size: 10
  gamma: 0.5

renderer:
  sh_degree: 3
  render_resolution: 112

model_2d: 
  stage1: true
  level: 3
  emb_dim: 512
  num_heads: 8
  n_groups: 40
  dino_dim: 768
  llm_dim: 512
  project_dim: 64
  freeze_text_encoder: false
  text_encoder_type: roberta-base
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  fuse_level: true

dataset:
  category: laso
  train_split: train
  test_split: test
  setting: seen
  num_workers: 8
  shuffle: true
  data_root: laso_root
  # Set category: piad + data_root: <PIAD_root> + use_image: true to enable the
  # interaction-image branch. Ignored for laso (no images). img_size must be /14.
  use_image: false
  use_sam: true
  img_size: 224
  # SAM teacher input when use_image + pre-extracted cache are enabled:
  #   masked_rgb (default): SAM-segmented foreground RGB fed to the trained DINOv2 path
  #   feature:              256-d SAM image embeddings fed to sam_proj
  sam_mode: masked_rgb
  # Directory of the pre-extracted SAM cache (defaults to <data_root>/sam_features)
  sam_feature_dir: null

# Offline SAM preprocessing (dataset/preprocess_sam.py)
sam:
  mode: masked_rgb            # must match dataset.sam_mode
  checkpoint: sam_vit_h_4b8939.pth
  model_type: vit_h
  img_size: 224
